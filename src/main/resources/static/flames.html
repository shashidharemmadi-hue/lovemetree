<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Meter Challenge ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <div class="card">

        <h1>❤️ Love Meter Challenge ❤️</h1>

        <p class="subtitle">
            Curious how compatible two people are?<br>
            Enter your name and your crush/partner's name to calculate your Love Score!
        </p>

        <div class="form-group">
            <label>Your Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Crush / Partner Name</label>
            <input
                type="text"
                id="partner"
                placeholder="Enter their name">
        </div>

        <button onclick="submitLove()">❤️ Calculate Love Score</button>

        <div id="result"></div>

    </div>
</div>

<script>
async function submitLove(){

    const name=document.getElementById("name").value;
    const partner=document.getElementById("partner").value;

    if(name==="" || partner===""){
        alert("Please fill both fields.");
        return;
    }

    const res=await fetch("https://lovemetree-1.onrender.com/api/calculate",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            yourName:name,
            partnerName:partner
        })
    });

    const data=await res.json();

    document.getElementById("result").innerHTML=`
        <h2>${data.score}% ❤️</h2>
        <p>${data.message}</p>
    `;
}
</script>

</body>
</html>
